<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width='', initial-scale=1.0">
    <title>grid system</title>
    <link rel="stylesheet" href="css/bootstrap-grid.css">
    <style>
        .container{
            border: 10px black;
        }
        .row{
            border: 10px black;
        } 
        .box{
            border: 5px black;
        }
        .col-1{
            border: 5px black;
        }
        .col-2{
            border: 5px black;
        }
        .col-3{
            border: 5px black;
        }
        .col-4{
            border: 5px black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-1 box">1</div> 
            <div class="col-1 box">2</div>
            <div class="col-1 box">3</div>
            <div class="col-1 box">4</div>
            <div class="col-1 box">5</div>
            <div class="col-1 box">6</div>
            <div class="col-1 box">7</div>
            <div class="col-1 box">8</div>
            <div class="col-1 box">9</div>
            <div class="col-1 box">10</div>
            <div class="col-1 box">11</div>
            <div class="col-1 box">12</div>
        </div>
        <div class="row">
            <div class=" col-2 box">1</div>
            <div class=" col-2 box">2</div>
            <div class=" col-2 box">3</div>
            <div class=" col-2 box">4</div>
            <div class=" col-2 box">5</div>
            <div class=" col-2 box">6</div>
        </div>
        <div class="row">
            <div class=" col-3 box">1</div>
            <div class=" col-3 box">2</div>
            <div class=" col-3 box">3</div>
            <div class=" col-3 box">4</div>
        </div>
        <div class="row">
            <div class=" col-4 box">1</div>
            <div class=" col-4 box">2</div>
            <div class=" col-4 box">3</div>
        </div>   
    </div>
</body>
</html>
