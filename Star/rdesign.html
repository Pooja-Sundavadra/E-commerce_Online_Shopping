<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Star Shopping</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff4ecd,#7c3aed);
    font-family: 'Segoe UI', sans-serif;
}

/* CARD */
.glass-card{
    width:100%;
    max-width:450px;
    padding:35px;
    border-radius:20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    color:white;
}

/* TITLE */
.title{
    text-align:center;
    font-weight:700;
    margin-bottom:20px;
}

/* INPUT */
.form-control{
    border:none;
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
}

.form-control:focus{
    box-shadow:none;
}

/* BUTTON */
.btn-custom{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background: linear-gradient(90deg,#ec4899,#a855f7);
    color:white;
    font-weight:600;
    transition:0.3s;
}

.btn-custom:hover{
    transform: scale(1.03);
}

/* LINKS */
a{
    color:white;
    text-decoration:underline;
}

/* CAPTCHA CENTER */
.g-recaptcha{
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="glass-card">

    <h3 class="title">🛍️ Create Account</h3>

    <form id="frm">

        <input type="text" id="fullname" class="form-control" placeholder="Full Name" required>

        <input type="email" id="email" class="form-control" placeholder="Email Address" required>

        <input type="password" id="password" class="form-control" placeholder="Password" required>

        <!-- CAPTCHA -->
        <div class="g-recaptcha" data-sitekey="6LcDRhUtAAAAANGneigklePNtlH-D3YkzeTyXU_z"></div>

        <button class="btn-custom">Register</button>

    </form>

    <div id="msg" class="text-center mt-3 text-warning small"></div>

    <!-- API RESPONSE -->
    <pre id="apiResponse" class="mt-3 p-2 bg-dark text-light rounded d-none" style="font-size:12px;"></pre>

    <div class="text-center mt-3">
        <a href="login.php">Login</a> |
        <a href="index.php">Home</a>
    </div>

</div>

<script>
document.getElementById('frm').onsubmit = async (e) => {
    e.preventDefault();

    const captcha = grecaptcha.getResponse();

    if(!captcha){
        document.getElementById('msg').innerText = "Please verify CAPTCHA!";
        return;
    }

    try{
        let r = await fetch('api/r.php', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                fullname: name.value,
                email: email.value,
                password: password.value,
                captcha: captcha
            })
        });

        let data = await r.json();

        let apiBox = document.getElementById('apiResponse');
        apiBox.classList.remove('d-none');
        apiBox.textContent = JSON.stringify(data, null, 2);

        if(data.status){
            document.getElementById('msg').innerText = "Registration Successful!";
            document.getElementById('frm').reset();
            grecaptcha.reset();
        } else {
            document.getElementById('msg').innerText = data.message;
        }

    } catch(error){
        document.getElementById('msg').innerText = "API Error!";
    }
};
</script>

</body>
</html>
